<template>
    <div class="dashboard-container">
        <!-- Executive Header -->
        <div class="dashboard-header">
            <div class="header-content">
                <div class="header-title-section">
                    <template if:true={showBackButton}>
                        <lightning-button-icon
                            icon-name="utility:back"
                            variant="bare"
                            alternative-text="Back to Dashboard"
                            onclick={handleBackToDashboard}
                            class="back-button">
                        </lightning-button-icon>
                    </template>
                    <lightning-icon icon-name="custom:custom14" size="large" class="header-icon"></lightning-icon>
                    <div class="header-text">
                        <h1 class="slds-text-heading_large">{headerTitle}</h1>
                        <p class="slds-text-body_small header-subtitle">{headerSubtitle}</p>
                    </div>
                </div>
                <div class="header-stats-row">
                    <div class="stat-box">
                        <lightning-icon icon-name="utility:success" size="small" class="stat-icon-success"></lightning-icon>
                        <div class="stat-content">
                            <div class="stat-value">{totalRequests}</div>
                            <div class="stat-label">AI Requests</div>
                        </div>
                    </div>
                    <div class="stat-box">
                        <lightning-icon icon-name="utility:clock" size="small" class="stat-icon-info"></lightning-icon>
                        <div class="stat-content">
                            <div class="stat-value">{timeSaved}h</div>
                            <div class="stat-label">Time Saved</div>
                        </div>
                    </div>
                    <div class="stat-box">
                        <lightning-icon icon-name="utility:chart" size="small" class="stat-icon-warning"></lightning-icon>
                        <div class="stat-content">
                            <div class="stat-value">{deliveryScore}%</div>
                            <div class="stat-label">Readiness</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dynamic Content Area -->
        <div class="dashboard-main-content">
            <!-- Dashboard View -->
            <template if:true={isDashboardView}>
                <div class="content-wrapper">

                <!-- Top Row: Readiness Score + Recent Requests -->
                <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_medium">

                    <!-- Delivery Readiness Score Card -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <article class="dashboard-card readiness-card">
                            <div class="card-header">
                                <h2 class="card-title">
                                    <lightning-icon icon-name="utility:metrics" size="small" class="title-icon"></lightning-icon>
                                    Delivery Readiness
                                </h2>
                            </div>
                            <div class="card-body">
                                <div class="readiness-score-wrapper">
                                    <div class="readiness-circle">
                                        <svg viewBox="0 0 120 120" class="progress-ring">
                                            <circle class="progress-ring-bg" cx="60" cy="60" r="50"></circle>
                                            <circle class="progress-ring-fill" cx="60" cy="60" r="50"
                                                    style={readinessCircleStyle}></circle>
                                        </svg>
                                        <div class="readiness-score-text">
                                            <div class="score-number">{deliveryScore}%</div>
                                            <div class="score-label">{readinessStatus}</div>
                                        </div>
                                    </div>
                                    <div class="readiness-breakdown">
                                        <div class="breakdown-item">
                                            <span class="breakdown-label">User Stories</span>
                                            <lightning-progress-bar value={userStoriesProgress} variant="base"></lightning-progress-bar>
                                        </div>
                                        <div class="breakdown-item">
                                            <span class="breakdown-label">Test Coverage</span>
                                            <lightning-progress-bar value={testCoverageProgress} variant="base"></lightning-progress-bar>
                                        </div>
                                        <div class="breakdown-item">
                                            <span class="breakdown-label">Documentation</span>
                                            <lightning-progress-bar value={documentationProgress} variant="base"></lightning-progress-bar>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </article>
                    </div>

                    <!-- Recent AI Requests Card -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_2-of-3">
                        <article class="dashboard-card recent-requests-card">
                            <div class="card-header">
                                <h2 class="card-title">
                                    <lightning-icon icon-name="utility:clock" size="small" class="title-icon"></lightning-icon>
                                    Recent AI Requests
                                </h2>
                                <lightning-button label="View All" variant="neutral" class="view-all-btn"></lightning-button>
                            </div>
                            <div class="card-body">
                                <template if:true={hasRecentRequests}>
                                    <ul class="recent-requests-list">
                                        <template for:each={recentRequests} for:item="request">
                                            <li key={request.id} class="request-item">
                                                <div class="request-icon-wrapper">
                                                    <lightning-icon icon-name={request.icon} size="x-small" class={request.iconClass}></lightning-icon>
                                                </div>
                                                <div class="request-details">
                                                    <div class="request-title">{request.title}</div>
                                                    <div class="request-meta">
                                                        <span class="request-time">{request.timeAgo}</span>
                                                        <span class="request-separator">•</span>
                                                        <span class="request-type">{request.type}</span>
                                                    </div>
                                                </div>
                                                <div class={request.statusClass}>
                                                    <lightning-icon icon-name={request.statusIcon} size="xx-small"></lightning-icon>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                                <template if:false={hasRecentRequests}>
                                    <div class="empty-state">
                                        <lightning-icon icon-name="utility:info" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No recent requests yet</p>
                                    </div>
                                </template>
                            </div>
                        </article>
                    </div>
                </div>

                <!-- Feature Cards Section -->
                <div class="section-header slds-m-bottom_medium">
                    <h2 class="section-title">
                        <lightning-icon icon-name="utility:apps" size="small" class="section-icon"></lightning-icon>
                        AI Tools & Features
                    </h2>
                </div>

                <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_large">
                    <template for:each={featureCards} for:item="feature">
                        <div key={feature.id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <article class="feature-card">
                                <div class="feature-card-header">
                                    <div class="feature-icon-wrapper" data-color={feature.colorClass}>
                                        <lightning-icon icon-name={feature.icon} size="medium" class="feature-icon"></lightning-icon>
                                    </div>
                                    <lightning-badge label={feature.badge} class={feature.badgeClass}></lightning-badge>
                                </div>
                                <div class="feature-card-body">
                                    <h3 class="feature-title">{feature.title}</h3>
                                    <p class="feature-description">{feature.description}</p>
                                    <div class="feature-stats">
                                        <div class="feature-stat">
                                            <lightning-icon icon-name="utility:trending" size="xx-small" class="stat-icon"></lightning-icon>
                                            <span class="stat-text">{feature.usageCount} uses</span>
                                        </div>
                                        <div class="feature-stat">
                                            <lightning-icon icon-name="utility:like" size="xx-small" class="stat-icon"></lightning-icon>
                                            <span class="stat-text">{feature.satisfaction}% success</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="feature-card-footer">
                                    <lightning-button
                                        label="Launch"
                                        variant="brand"
                                        onclick={handleFeatureLaunch}
                                        data-id={feature.id}
                                        class="launch-button"
                                        icon-name="utility:forward">
                                    </lightning-button>
                                </div>
                                <template if:true={feature.isLoading}>
                                    <div class="card-loading-overlay">
                                        <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
                                    </div>
                                </template>
                            </article>
                        </div>
                    </template>
                </div>

                <!-- Bottom Row: Most Used Features + Quick Actions -->
                <div class="slds-grid slds-gutters slds-wrap">

                    <!-- Most Used Features Card -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <article class="dashboard-card most-used-card">
                            <div class="card-header">
                                <h2 class="card-title">
                                    <lightning-icon icon-name="utility:trending" size="small" class="title-icon"></lightning-icon>
                                    Most Used Features
                                </h2>
                            </div>
                            <div class="card-body">
                                <template if:true={hasMostUsedFeatures}>
                                    <ul class="most-used-list">
                                        <template for:each={mostUsedFeatures} for:item="feature">
                                            <li key={feature.id} class="most-used-item">
                                                <div class="rank-badge">{feature.rank}</div>
                                                <lightning-icon icon-name={feature.icon} size="x-small" class="most-used-icon"></lightning-icon>
                                                <div class="most-used-details">
                                                    <div class="most-used-name">{feature.name}</div>
                                                    <div class="most-used-count">{feature.count} uses this month</div>
                                                </div>
                                                <div class="usage-bar-wrapper">
                                                    <div class="usage-bar" style={feature.barStyle}></div>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                            </div>
                        </article>
                    </div>

                    <!-- Quick Actions Card -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <article class="dashboard-card quick-actions-card">
                            <div class="card-header">
                                <h2 class="card-title">
                                    <lightning-icon icon-name="utility:lightning_inspector" size="small" class="title-icon"></lightning-icon>
                                    Quick Actions
                                </h2>
                            </div>
                            <div class="card-body">
                                <div class="quick-actions-grid">
                                    <template for:each={quickActions} for:item="action">
                                        <button key={action.id} class="quick-action-btn" onclick={handleQuickAction} data-id={action.id}>
                                            <lightning-icon icon-name={action.icon} size="small" class="quick-action-icon"></lightning-icon>
                                            <span class="quick-action-label">{action.label}</span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </article>
                    </div>
                </div>

                </div>
            </template>

            <!-- UAT Test Generator View -->
            <template if:true={isUATView}>
                <c-ai-uat-test-generator></c-ai-uat-test-generator>
            </template>

            <!-- Executive Status Generator View -->
            <template if:true={isExecutiveStatusView}>
                <c-ai-executive-status-generator></c-ai-executive-status-generator>
            </template>

            <!-- RAID Generator View -->
            <template if:true={isRAIDView}>
                <c-ai-raid-generator></c-ai-raid-generator>
            </template>

            <!-- Customer Meeting Prep View -->
            <template if:true={isMeetingPrepView}>
                <c-ai-customer-meeting-prep></c-ai-customer-meeting-prep>
            </template>

            <!-- Prompt Library View -->
            <template if:true={isPromptLibraryView}>
                <c-ai-prompt-library></c-ai-prompt-library>
            </template>
        </div>

        <!-- Global Loading Overlay -->
        <template if:true={isLoading}>
            <div class="global-loading-overlay">
                <div class="loading-content">
                    <lightning-spinner alternative-text="Loading..." size="large" variant="brand"></lightning-spinner>
                    <p class="loading-text">Loading dashboard...</p>
                </div>
            </div>
        </template>
    </div>
</template>
