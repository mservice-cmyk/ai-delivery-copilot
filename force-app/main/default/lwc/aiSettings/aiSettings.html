<template>
    <div class="settings-container">
        <!-- Header -->
        <div class="settings-header">
            <div class="header-content">
                <lightning-icon icon-name="utility:settings" size="large" class="header-icon"></lightning-icon>
                <div class="header-text">
                    <h1 class="slds-text-heading_large">⚙️ Architect Studio AI Settings</h1>
                    <p class="slds-text-body_small slds-text-color_weak">
                        Configure your AI provider and manage connection settings
                    </p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="settings-content">
            <!-- Current Status Card -->
            <lightning-card title="Current Status" icon-name="utility:info">
                <div class="slds-p-around_medium">
                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                        <div>
                            <p class="slds-text-body_regular slds-m-bottom_x-small">
                                <strong>Active Provider:</strong> {currentProviderName}
                            </p>
                            <div class={statusClass}>
                                {currentStatusBadge}
                            </div>
                        </div>
                        <div>
                            <lightning-button
                                label="Refresh"
                                icon-name="utility:refresh"
                                onclick={handleRefreshSettings}
                                variant="neutral">
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </lightning-card>

            <!-- AI Provider Selection -->
            <lightning-card title="AI Provider" icon-name="utility:choice" class="slds-m-top_medium">
                <div class="slds-p-around_medium">
                    <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_medium">
                        Select your preferred AI provider. Demo Mode is always available and uses realistic sample responses.
                        Live AI providers require Named Credential configuration.
                    </p>

                    <!-- Provider Options -->
                    <div class="provider-grid">
                        <template for:each={providerOptions} for:item="provider">
                            <div key={provider.name}
                                 class={provider.cardClass}
                                 data-provider={provider.name}
                                 onclick={handleProviderChange}>

                                <div class="provider-header">
                                    <div class="provider-radio">
                                        <template if:true={provider.isSelected}>
                                            <lightning-icon icon-name="utility:check" size="x-small"></lightning-icon>
                                        </template>
                                        <template if:false={provider.isSelected}>
                                            <span class="radio-empty"></span>
                                        </template>
                                    </div>
                                    <h3 class="slds-text-heading_small">{provider.displayName}</h3>
                                </div>

                                <p class="slds-text-body_small slds-text-color_weak slds-m-vertical_small">
                                    {provider.description}
                                </p>

                                <div class="provider-footer">
                                    <span class={provider.statusClass}>
                                        {provider.statusIcon} {provider.status}
                                    </span>
                                    <template if:true={provider.requiresCredential}>
                                        <span class="slds-text-body_small slds-text-color_weak">
                                            Requires: {provider.credentialName}
                                        </span>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Action Buttons -->
                    <div class="slds-m-top_large slds-text-align_center">
                        <lightning-button
                            label="Test Connection"
                            icon-name="utility:connected_apps"
                            onclick={handleTestConnection}
                            disabled={isTestingConnection}
                            variant="neutral"
                            class="slds-m-right_small">
                        </lightning-button>
                        <lightning-button
                            label="Save Settings"
                            icon-name="utility:save"
                            onclick={handleSaveSettings}
                            variant="brand"
                            class="slds-m-right_small">
                        </lightning-button>
                        <lightning-button
                            label="Setup Instructions"
                            icon-name="utility:help"
                            onclick={handleShowInstructions}
                            variant="neutral">
                        </lightning-button>
                    </div>

                    <!-- Test Results -->
                    <template if:true={testResults}>
                        <div class="slds-m-top_large">
                            <lightning-card title="Connection Test Results">
                                <div class="slds-p-around_medium">
                                    <template if:true={testResults.success}>
                                        <div class="test-result success">
                                            <lightning-icon icon-name="utility:success" size="small" class="slds-m-right_x-small"></lightning-icon>
                                            <span>Connection successful!</span>
                                        </div>
                                    </template>
                                    <template if:false={testResults.success}>
                                        <div class="test-result error">
                                            <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small"></lightning-icon>
                                            <span>Connection failed: {testResults.error}</span>
                                        </div>
                                    </template>
                                    <div class="slds-m-top_small">
                                        <p class="slds-text-body_small">
                                            <strong>Provider:</strong> {testResults.provider}<br/>
                                            <strong>Model:</strong> {testResults.model}<br/>
                                            <strong>Timestamp:</strong> {testResults.timestamp}
                                        </p>
                                        <template if:true={testResults.responsePreview}>
                                            <p class="slds-text-body_small slds-m-top_x-small">
                                                <strong>Response Preview:</strong><br/>
                                                <em>{testResults.responsePreview}</em>
                                            </p>
                                        </template>
                                    </div>
                                </div>
                            </lightning-card>
                        </div>
                    </template>
                </div>
            </lightning-card>

            <!-- Setup Instructions Modal -->
            <template if:true={showInstructions}>
                <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                    onclick={handleCloseInstructions}>
                                <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                                <span class="slds-assistive-text">Close</span>
                            </button>
                            <h2 class="slds-text-heading_medium">Setup Instructions</h2>
                        </header>
                        <div class="slds-modal__content slds-p-around_medium">
                            <template if:true={setupInstructions}>
                                <!-- Claude Instructions -->
                                <div class="slds-m-bottom_large">
                                    <h3 class="slds-text-heading_small slds-m-bottom_small">
                                        {setupInstructions.claude.title}
                                    </h3>
                                    <ol class="slds-list_ordered">
                                        <template for:each={setupInstructions.claude.steps} for:item="step">
                                            <li key={step} class="slds-m-bottom_x-small">{step}</li>
                                        </template>
                                    </ol>
                                    <p class="slds-text-body_small slds-m-top_small">
                                        <a href={setupInstructions.claude.docsUrl} target="_blank">
                                            View Claude API Documentation →
                                        </a>
                                    </p>
                                </div>

                                <!-- Gemini Instructions -->
                                <div>
                                    <h3 class="slds-text-heading_small slds-m-bottom_small">
                                        {setupInstructions.gemini.title}
                                    </h3>
                                    <ol class="slds-list_ordered">
                                        <template for:each={setupInstructions.gemini.steps} for:item="step">
                                            <li key={step} class="slds-m-bottom_x-small">{step}</li>
                                        </template>
                                    </ol>
                                    <p class="slds-text-body_small slds-m-top_small">
                                        <a href={setupInstructions.gemini.docsUrl} target="_blank">
                                            View Gemini API Documentation →
                                        </a>
                                    </p>
                                </div>
                            </template>
                        </div>
                        <footer class="slds-modal__footer">
                            <lightning-button label="Close" onclick={handleCloseInstructions}></lightning-button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

            <!-- Loading Spinner -->
            <template if:true={isTestingConnection}>
                <div class="loading-overlay">
                    <lightning-spinner
                        alternative-text="Testing connection..."
                        size="medium"
                        variant="brand">
                    </lightning-spinner>
                </div>
            </template>
        </div>
    </div>
</template>
